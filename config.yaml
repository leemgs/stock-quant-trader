# KIS Quant Trader Configuration

auth:
  kis_app_key: "your_app_key"
  kis_app_secret: "your_app_secret"
  kis_account_no: "your_account_no" # 계좌번호 8자리
  kis_account_suffix: "01"         # 계좌부호 2자리 (보통 01)
  kis_virtual_trading: true        # 모의투자 여부 (true/false)
  telegram_token: ""               # 텔레그램 봇 토큰
  chat_id: ""                      # 텔레그램 챗 ID
  gemini_api_key: ""               # Google Gemini API Key

trading:
  universe:
    - "005930" # 삼성전자
    - "000660" # SK하이닉스
    - "035420" # NAVER
    - "035720" # 카카오
  max_budget: 10000      # 극소액(1만원) 도전
  k_value: 0.4
  stop_loss: 0.015       # 1.5% 칼손절
  take_profit: 0.03      # 3% 1차 익절
  max_stocks: 1          # 소액 집중 투자
  extreme_growth:
    enable: true
    use_margin_leverage: true  # 미수/신용 최대치 사용
    smart_order_routing: true  # 지정가(Maker) 매매를 통한 수수료 방어
    micro_scalping_ticks: 3    # 호가 3틱 먹기 스캘핑
    limit_up_overnight: true   # 상한가 도달 시 오버나잇 허용
    kelly_criterion: true      # 승률에 따른 동적 비중 조절

logging:
  level: "INFO"
  file: "logs/trading.log"
